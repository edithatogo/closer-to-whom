name: Nightly maximal harness
on:
  schedule:
    - cron: "7 1 * * *"
  workflow_dispatch:
permissions:
  contents: read
concurrency:
  group: nightly
  cancel-in-progress: true
jobs:
  maximal:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install uv
      - run: uv sync --all-extras
      - run: uv run python scripts/release_gate.py
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: nightly-release-receipt
          path: |
            release/
            coverage.xml
          if-no-files-found: warn
