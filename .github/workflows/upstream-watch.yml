name: Upstream integration watch
on:
  schedule:
    - cron: "11 5 * * 2"
  workflow_dispatch:
permissions:
  contents: read
  issues: write
concurrency:
  group: upstream-watch
  cancel-in-progress: true
jobs:
  compatibility:
    timeout-minutes: 25
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install uv
      - run: uv sync --extra dev
      - run: uv run python scripts/upstream_compatibility.py
