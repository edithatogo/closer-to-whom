name: Mojo canary
on:
  workflow_dispatch:
  schedule:
    - cron: "23 4 * * 3"
permissions:
  contents: read
concurrency:
  group: mojo-canary
  cancel-in-progress: true
jobs:
  canary:
    timeout-minutes: 20
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1
        with:
          persist-credentials: false
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97
        with:
          python-version: "3.14"
      - uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78
        with:
          enable-cache: true
      - run: uv sync --locked --extra dev
      - name: Install Mojo toolchain locally
        run: |
          echo "Install the pinned Modular/Mojo toolchain here once the local release channel is selected."
          echo "This scheduled canary remains non-release-critical until ADR promotion gates pass."
      - run: uv run closer-to-whom mojo-canary
