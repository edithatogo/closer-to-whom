name: Mojo canary
on:
  workflow_dispatch:
  schedule:
    - cron: "23 4 * * 3"
permissions:
  contents: read
concurrency:
  group: mojo-canary
  cancel-in-progress: true
jobs:
  canary:
    timeout-minutes: 20
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install uv
      - run: uv sync --locked --extra dev
      - name: Install Mojo toolchain locally
        run: |
          echo "Install the pinned Modular/Mojo toolchain here once the local release channel is selected."
          echo "This scheduled canary remains non-release-critical until ADR promotion gates pass."
      - run: uv run closer-to-whom mojo-canary
