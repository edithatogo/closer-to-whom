name: Clean-room reproducibility

permissions:
  contents: read

on:
  schedule:
    - cron: "23 3 * * 1"
  workflow_dispatch:

concurrency:
  group: clean-room-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - run: uv sync --locked --all-extras
      - run: uv run python scripts/clean_room_verify.py
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: clean-room-receipt
          path: release/clean-room-receipt.json
          if-no-files-found: warn
