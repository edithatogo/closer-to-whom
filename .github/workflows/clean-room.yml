name: Clean-room reproducibility

permissions:
  contents: read

on:
  schedule:
    - cron: "23 3 * * 1"
  workflow_dispatch:

concurrency:
  group: clean-room-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          fetch-depth: 0
      - uses: astral-sh/setup-uv@94527f2e458b27549849d47d273a16bec83a01e9
        with:
          enable-cache: true
      - run: uv sync --locked --all-extras
      - run: uv run python scripts/clean_room_verify.py
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        if: always()
        with:
          name: clean-room-receipt
          path: release/clean-room-receipt.json
          if-no-files-found: warn
