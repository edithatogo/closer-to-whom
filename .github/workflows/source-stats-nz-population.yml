name: Fetch Stats NZ population source

on:
  workflow_dispatch:
    inputs:
      dataset_id:
        description: Approved Stats NZ dataset identifier used in the receipt
        required: true
        type: string
      request_url:
        description: Exact approved ADE data-query URL
        required: true
        type: string
      structure_url:
        description: Exact approved ADE structure-query URL for schema metadata
        required: true
        type: string
      confirm:
        description: Type FETCH to authorize retrieval into an Actions artifact
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: stats-nz-population-source
  cancel-in-progress: false

jobs:
  fetch:
    if: github.ref == 'refs/heads/main' && inputs.confirm == 'FETCH'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      STATS_NZ_API_KEY: ${{ secrets.STATS_NZ_API_KEY }}
      DATASET_ID: ${{ inputs.dataset_id }}
      REQUEST_URL: ${{ inputs.request_url }}
      STRUCTURE_URL: ${{ inputs.structure_url }}
    steps:
      - name: Require Stats NZ API credential
        run: test -n "$STATS_NZ_API_KEY"
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1
        with:
          persist-credentials: false
      - name: Fetch approved Data Explorer response
        run: |
          set -euo pipefail
          export RETRIEVED_ON="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo "RETRIEVED_ON=$RETRIEVED_ON" >> "$GITHUB_ENV"
          case "$REQUEST_URL" in
            https://api.data.stats.govt.nz/rest/data/*) ;;
            *) echo 'request_url must target the current Stats NZ ADE data endpoint over HTTPS' >&2; exit 1 ;;
          esac
          case "$STRUCTURE_URL" in
            https://api.data.stats.govt.nz/rest/dataflow/*) ;;
            *) echo 'structure_url must target the current Stats NZ ADE dataflow endpoint over HTTPS' >&2; exit 1 ;;
          esac
          mkdir -p "$GITHUB_WORKSPACE/artifacts/stats-nz-population"
          curl --fail-with-body --location --retry 3 --retry-all-errors --silent --show-error \
            -H "Ocp-Apim-Subscription-Key: $STATS_NZ_API_KEY" \
            -H 'Accept: application/json' "$REQUEST_URL" \
            -o "$GITHUB_WORKSPACE/artifacts/stats-nz-population/response.json"
          test -s "$GITHUB_WORKSPACE/artifacts/stats-nz-population/response.json"
          curl --fail-with-body --location --retry 3 --retry-all-errors --silent --show-error \
            -H "Ocp-Apim-Subscription-Key: $STATS_NZ_API_KEY" \
            -H 'Accept: application/xml' "$STRUCTURE_URL" \
            -o "$GITHUB_WORKSPACE/artifacts/stats-nz-population/structure.xml"
          test -s "$GITHUB_WORKSPACE/artifacts/stats-nz-population/structure.xml"
      - name: Write source receipt
        run: |
          python - <<'PY'
          import hashlib, json, os
          from pathlib import Path
          root = Path("artifacts/stats-nz-population")
          payload = {
              "schema_version": "1.2.0",
              "source_id": "candidate.statsnz-population-estimates-2023-base",
              "provider": "stats-nz-data-explorer-api",
              "dataset_id": os.environ["DATASET_ID"],
              "request_url": os.environ["REQUEST_URL"],
              "structure_url": os.environ["STRUCTURE_URL"],
              "retrieved_on": os.environ["RETRIEVED_ON"][:10],
              "sha256": hashlib.sha256((root / "response.json").read_bytes()).hexdigest(),
              "structure_sha256": hashlib.sha256((root / "structure.xml").read_bytes()).hexdigest(),
              "structure_format": "application/xml; profile=SDMX-ML 2.1",
              "output_policy": "Actions artifact only until schema, licence, and source terms are reviewed",
              "claim_boundary": "Population denominator only; no individual records or treatment demand are asserted.",
          }
          (root / "receipt.json").write_text(json.dumps(payload, indent=2, sort_keys=True) + "\n")
          PY
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: stats-nz-population-${{ inputs.dataset_id }}
          path: artifacts/stats-nz-population
          if-no-files-found: error
          retention-days: 14
