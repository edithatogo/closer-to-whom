name: Security and supply chain
on:
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: "17 3 * * 1"
  workflow_dispatch:
permissions:
  contents: read
concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true
jobs:
  python-audit:
    timeout-minutes: 20
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: "3.12"
      - run: python -m pip install uv
      - run: uv sync --locked --extra dev
      - run: uv run pip-audit
      - run: uv run python scripts/secret_scan.py
      - run: uv run python scripts/check_privacy_and_licences.py
      - run: uv run python scripts/check_workflows.py
      - run: uv run python scripts/generate_sbom.py
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: sbom
          path: release/sbom.cdx.json
          if-no-files-found: error
  codeql:
    timeout-minutes: 30
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false
      - uses: github/codeql-action/init@1ad29ea4a422cce9a242a9fae469541dcd08addc
        with:
          languages: python
      - uses: github/codeql-action/analyze@1ad29ea4a422cce9a242a9fae469541dcd08addc
