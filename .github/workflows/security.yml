name: Security and supply chain
on:
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: "17 3 * * 1"
  workflow_dispatch:
permissions:
  contents: read
concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true
jobs:
  python-audit:
    timeout-minutes: 20
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.12"
      - run: python -m pip install uv
      - run: uv sync --locked --extra dev
      - run: uv run pip-audit
      - run: uv run python scripts/secret_scan.py
      - run: uv run python scripts/check_privacy_and_licences.py
      - run: uv run python scripts/check_workflows.py
      - run: uv run python scripts/generate_sbom.py
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: sbom
          path: release/sbom.cdx.json
          if-no-files-found: error
  codeql:
    timeout-minutes: 30
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false
      - uses: github/codeql-action/init@02c5e83432fe5497fd85b873b6c9f16a8578e1d9
        with:
          languages: python
      - uses: github/codeql-action/analyze@02c5e83432fe5497fd85b873b6c9f16a8578e1d9
