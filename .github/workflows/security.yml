name: Security and supply chain
on:
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: "17 3 * * 1"
  workflow_dispatch:
permissions:
  contents: read
concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true
jobs:
  python-audit:
    timeout-minutes: 20
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1
        with:
          persist-credentials: false
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97
        with:
          python-version: "3.14"
      - uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78
        with:
          enable-cache: true
      - run: uv sync --locked --extra dev
      - run: uv run pip-audit
      - run: uv run python scripts/secret_scan.py
      - run: uv run python scripts/check_privacy_and_licences.py
      - run: uv run python scripts/check_workflows.py
      - run: uv run python scripts/generate_sbom.py
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: sbom
          path: release/sbom.cdx.json
          if-no-files-found: error
  codeql:
    timeout-minutes: 30
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1
        with:
          persist-credentials: false
      - uses: github/codeql-action/init@1ad29ea4a422cce9a242a9fae469541dcd08addc
        with:
          languages: python
      - uses: github/codeql-action/analyze@1ad29ea4a422cce9a242a9fae469541dcd08addc
