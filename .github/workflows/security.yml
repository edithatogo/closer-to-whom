name: Security and supply chain
on:
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: "17 3 * * 1"
  workflow_dispatch:
permissions:
  contents: read
  security-events: write
concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true
jobs:
  python-audit:
    timeout-minutes: 20
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install uv
      - run: uv sync --extra dev
      - run: uv run pip-audit
      - run: uv run python scripts/secret_scan.py
      - run: uv run python scripts/check_privacy_and_licences.py
      - run: uv run python scripts/check_workflows.py
      - run: uv run python scripts/generate_sbom.py
      - uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: release/sbom.cdx.json
          if-no-files-found: error
  codeql:
    timeout-minutes: 30
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: github/codeql-action/init@v3
        with:
          languages: python
      - uses: github/codeql-action/analyze@v3
