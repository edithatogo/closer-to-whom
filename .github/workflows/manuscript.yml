name: Manuscript scaffolds

permissions:
  contents: read

on:
  pull_request:
    paths:
      - "manuscript/**"
      - "docs/publication/**"
      - "assumptions/**"
      - ".github/workflows/manuscript.yml"
  push:
    branches: [main]
    paths:
      - "manuscript/**"
      - "docs/publication/**"
      - "assumptions/**"
  workflow_dispatch:

concurrency:
  group: manuscript-${{ github.ref }}
  cancel-in-progress: true

jobs:
  render:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: quarto-dev/quarto-actions/setup@8a96df13519ee81fd526f2dfca5962811136661b
      - uses: quarto-dev/quarto-actions/render@8a96df13519ee81fd526f2dfca5962811136661b
        with:
          path: manuscript
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: manuscript-scaffolds
          path: release/manuscript
          if-no-files-found: error
