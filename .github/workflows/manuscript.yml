name: Manuscript scaffolds

permissions:
  contents: read

on:
  pull_request:
    paths:
      - "manuscript/**"
      - "docs/publication/**"
      - "assumptions/**"
      - ".github/workflows/manuscript.yml"
  push:
    branches: [main]
    paths:
      - "manuscript/**"
      - "docs/publication/**"
      - "assumptions/**"
  workflow_dispatch:

concurrency:
  group: manuscript-${{ github.ref }}
  cancel-in-progress: true

jobs:
  render:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      - uses: quarto-dev/quarto-actions/setup@8a96df13519ee81fd526f2dfca5962811136661b
      - uses: quarto-dev/quarto-actions/render@8a96df13519ee81fd526f2dfca5962811136661b
        with:
          path: manuscript
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: manuscript-scaffolds
          path: release/manuscript
          if-no-files-found: error
