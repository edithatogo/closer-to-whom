name: Contracts and generated files
on:
  pull_request:
    paths:
      - "assumptions/**"
      - "scenarios/**"
      - "schemas/**"
      - "data/public/**"
      - "conductor/**"
      - "docs/publication/**"
      - "scripts/check_*"
  workflow_dispatch:
permissions:
  contents: read
concurrency:
  group: contracts-${{ github.ref }}
  cancel-in-progress: true
jobs:
  contracts:
    timeout-minutes: 15
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.12"
      - run: python -m pip install uv
      - run: uv sync --locked --extra dev
      - run: uv run python scripts/check_contracts.py
      - run: uv run python scripts/check_generated_files.py
      - run: uv run python scripts/check_lockfile_portability.py
      - run: uv run python scripts/check_claim_boundaries.py
      - run: uv run python scripts/check_privacy_and_licences.py
