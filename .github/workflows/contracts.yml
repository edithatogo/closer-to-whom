name: Contracts and generated files
on:
  pull_request:
    paths:
      - "assumptions/**"
      - "scenarios/**"
      - "schemas/**"
      - "data/public/**"
      - "conductor/**"
      - "docs/publication/**"
      - "scripts/check_*"
  workflow_dispatch:
permissions:
  contents: read
concurrency:
  group: contracts-${{ github.ref }}
  cancel-in-progress: true
jobs:
  contracts:
    timeout-minutes: 15
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: "3.12"
      - run: python -m pip install uv
      - run: uv sync --locked --extra dev
      - run: uv run python scripts/check_contracts.py
      - run: uv run python scripts/check_generated_files.py
      - run: uv run python scripts/check_lockfile_portability.py
      - run: uv run python scripts/check_claim_boundaries.py
      - run: uv run python scripts/check_privacy_and_licences.py
