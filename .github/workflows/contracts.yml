name: Contracts and generated files
on:
  pull_request:
    paths:
      - "assumptions/**"
      - "scenarios/**"
      - "schemas/**"
      - "data/public/**"
      - "conductor/**"
      - "docs/publication/**"
      - "scripts/check_*"
      - ".github/workflows/**"
      - "Dockerfile"
      - "pyproject.toml"
      - "uv.lock"
  workflow_dispatch:
permissions:
  contents: read
concurrency:
  group: contracts-${{ github.ref }}
  cancel-in-progress: true
jobs:
  contracts:
    timeout-minutes: 15
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1
        with:
          persist-credentials: false
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97
        with:
          python-version: "3.14"
      - uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78
        with:
          enable-cache: true
      - run: uv sync --locked --extra dev
      - run: uv run python scripts/check_contracts.py
      - run: uv run python scripts/check_generated_files.py
      - run: uv run python scripts/check_lockfile_portability.py
      - run: uv run python scripts/check_claim_boundaries.py
      - run: uv run python scripts/check_privacy_and_licences.py
