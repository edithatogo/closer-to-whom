name: Release
on:
  push:
    tags: ["v*"]
  workflow_dispatch:
permissions:
  contents: write
  id-token: write
  attestations: write
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false
jobs:
  build-release:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false
          fetch-depth: 0
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.12"
      - run: python -m pip install uv
      - run: uv sync --locked --all-extras
      - run: uv run python scripts/release_gate.py
      - run: uv run python scripts/publication_readiness.py
      - run: uv run python scripts/create_release_manifest.py
      - name: Build source archive and bundle
        run: |
          git archive --format=zip --output=release/closer-to-whom-${GITHUB_REF_NAME}.zip HEAD
          git bundle create release/closer-to-whom-${GITHUB_REF_NAME}.bundle --all
          sha256sum release/* > release/SHA256SUMS
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: release-candidate
          path: |
            release/
            dist/
          if-no-files-found: error
      - uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            release/*
            dist/*
          generate_release_notes: true
