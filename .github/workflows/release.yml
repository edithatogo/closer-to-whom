name: Release
on:
  push:
    tags: ["v*"]
  workflow_dispatch:
permissions:
  contents: read
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false
jobs:
  build-release:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1
        with:
          persist-credentials: false
          fetch-depth: 0
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97
        with:
          python-version: "3.14"
      - uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78
        with:
          enable-cache: true
      - run: uv sync --locked --all-extras
      - run: uv run python scripts/release_gate.py
      - run: uv run python scripts/publication_readiness.py
      - run: uv run python scripts/create_release_manifest.py
      - name: Build source archive and bundle
        run: |
          git archive --format=zip --output=release/closer-to-whom-${GITHUB_REF_NAME}.zip HEAD
          git bundle create release/closer-to-whom-${GITHUB_REF_NAME}.bundle --all
          sha256sum release/* > release/SHA256SUMS
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: release-candidate
          path: |
            release/
            dist/
          if-no-files-found: error
      - uses: softprops/action-gh-release@7c4723f7a335432393329f8f1c564994ce50185d
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            release/*
            dist/*
          generate_release_notes: true
