name: Release
on:
  push:
    tags: ["v*"]
  workflow_dispatch:
permissions:
  contents: read
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false
jobs:
  build-release:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false
          fetch-depth: 0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: "3.12"
      - run: python -m pip install uv
      - run: uv sync --locked --all-extras
      - run: uv run python scripts/release_gate.py
      - run: uv run python scripts/publication_readiness.py
      - run: uv run python scripts/create_release_manifest.py
      - name: Build source archive and bundle
        run: |
          git archive --format=zip --output=release/closer-to-whom-${GITHUB_REF_NAME}.zip HEAD
          git bundle create release/closer-to-whom-${GITHUB_REF_NAME}.bundle --all
          sha256sum release/* > release/SHA256SUMS
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: release-candidate
          path: |
            release/
            dist/
          if-no-files-found: error
      - uses: softprops/action-gh-release@7c4723f7a335432393329f8f1c564994ce50185d
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            release/*
            dist/*
          generate_release_notes: true
