name: Dashboard container
on:
  pull_request:
    paths: ["src/closer_to_whom/dashboard/**", "containers/**", "app.py", "artifacts/demo/**"]
  push:
    branches: [main]
    paths: ["src/closer_to_whom/dashboard/**", "containers/**", "app.py", "artifacts/demo/**"]
  workflow_dispatch:
permissions:
  contents: read
concurrency:
  group: dashboard-${{ github.ref }}
  cancel-in-progress: true
jobs:
  build-smoke:
    timeout-minutes: 30
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: "3.14"
      - uses: astral-sh/setup-uv@94527f2e458b27549849d47d273a16bec83a01e9
        with:
          enable-cache: true
      - run: uv sync --locked --all-extras
      - run: uv run closer-to-whom demo --output artifacts/demo
      - run: uv run python scripts/dashboard_smoke.py
      - name: Build image
        run: docker build -f containers/huggingface.Dockerfile -t closer-to-whom-space:${{ github.sha }} .
      - name: Scan image contents for prohibited paths
        run: |
          docker run --rm --entrypoint sh closer-to-whom-space:${{ github.sha }} -c \
            'test ! -e /app/data/raw && test ! -e /app/data/licensed && test ! -e /app/data/private'
