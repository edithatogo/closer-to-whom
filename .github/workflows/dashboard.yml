name: Dashboard container
on:
  pull_request:
    paths: ["src/closer_to_whom/dashboard/**", "containers/**", "app.py", "artifacts/demo/**"]
  push:
    branches: [main]
    paths: ["src/closer_to_whom/dashboard/**", "containers/**", "app.py", "artifacts/demo/**"]
  workflow_dispatch:
permissions:
  contents: read
concurrency:
  group: dashboard-${{ github.ref }}
  cancel-in-progress: true
jobs:
  build-smoke:
    timeout-minutes: 30
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1
        with:
          persist-credentials: false
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97
        with:
          python-version: "3.14"
      - uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78
        with:
          enable-cache: true
      - run: uv sync --locked --all-extras
      - run: uv run closer-to-whom demo --output artifacts/demo
      - run: uv run python scripts/dashboard_smoke.py
      - name: Build image
        run: docker build -f containers/huggingface.Dockerfile -t closer-to-whom-space:${{ github.sha }} .
      - name: Scan image contents for prohibited paths
        run: |
          docker run --rm --entrypoint sh closer-to-whom-space:${{ github.sha }} -c \
            'test ! -e /app/data/raw && test ! -e /app/data/licensed && test ! -e /app/data/private'
