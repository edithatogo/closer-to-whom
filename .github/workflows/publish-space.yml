name: Publish Hugging Face Space

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: Type PUBLISH to authorize a public Space update
        required: true
        type: string
permissions:
  contents: read
concurrency:
  group: hugging-face-space
  cancel-in-progress: false

jobs:
  publish:
    if: github.ref == 'refs/heads/main' && inputs.confirm == 'PUBLISH'
    environment: hugging-face
    timeout-minutes: 30
    runs-on: ubuntu-latest
    env:
      HF_TOKEN: ${{ secrets.HF_TOKEN }}
      HF_SPACE_ID: ${{ secrets.HF_SPACE_ID }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1
        with:
          persist-credentials: false
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97
        with:
          python-version: "3.14"
          cache: pip
      - uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78
        with:
          enable-cache: true
      - name: Require publication credentials
        shell: bash
        run: |
          test -n "$HF_TOKEN" || { echo "HF_TOKEN is required in the hugging-face environment" >&2; exit 1; }
          test -n "$HF_SPACE_ID" || { echo "HF_SPACE_ID is required in the hugging-face environment" >&2; exit 1; }
          case "$HF_SPACE_ID" in
            */*) ;;
            *) echo "HF_SPACE_ID must be a namespace/name Space identifier" >&2; exit 1 ;;
          esac
      - name: Build reproducible aggregate payload
        run: |
          uv sync --locked --all-extras
          uv run closer-to-whom demo --output artifacts/demo
          uv run python scripts/dashboard_smoke.py
      - name: Assemble free Static Space repository
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p space-dist
          cp spaces/static/README.md space-dist/README.md
          uv run python scripts/build_static_space.py --results artifacts/demo --output space-dist
          test ! -e space-dist/data/raw
          test ! -e space-dist/data/licensed
          test ! -e space-dist/data/private
      - name: Publish Space commit
        shell: bash
        run: |
          set -euo pipefail
          cd space-dist
          git init --initial-branch=main
          git config user.name "closer-to-whom publisher"
          git config user.email "actions@users.noreply.github.com"
          git add README.md index.html
          git commit -m "publish aggregate dashboard ${GITHUB_SHA}"
          GIT_CONFIG_COUNT=1 \
            GIT_CONFIG_KEY_0=http.extraheader \
            GIT_CONFIG_VALUE_0="Authorization: Basic $(printf 'oauth2:%s' "$HF_TOKEN" | base64 -w0)" \
            GIT_TERMINAL_PROMPT=0 \
            git push --force "https://huggingface.co/spaces/${HF_SPACE_ID}.git" HEAD:main
