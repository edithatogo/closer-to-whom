name: Supply-chain attestations

permissions:
  contents: read

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

concurrency:
  group: supply-chain-${{ github.ref }}
  cancel-in-progress: false

jobs:
  attest:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          fetch-depth: 0
      - uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78
        with:
          enable-cache: true
      - run: uv sync --locked --all-extras
      - run: uv run python -m build
      - run: uv run python scripts/generate_sbom.py --output release/sbom.cdx.json
      - uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373
        with:
          subject-path: dist/*
      - uses: actions/attest-sbom@c604332985a26aa8cf1bdc465b92731239ec6b9e
        with:
          subject-path: dist/*
          sbom-path: release/sbom.cdx.json
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: supply-chain-materials
          path: |
            dist/*
            release/sbom.cdx.json
          if-no-files-found: error
          retention-days: 30
