name: Supply-chain attestations

permissions:
  contents: read

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

concurrency:
  group: supply-chain-${{ github.ref }}
  cancel-in-progress: false

jobs:
  attest:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0
      - uses: astral-sh/setup-uv@d0cc045d04ccac9d8b7881df0226f9e82c39688e
        with:
          enable-cache: true
      - run: uv sync --locked --all-extras
      - run: uv run python -m build
      - run: uv run python scripts/generate_sbom.py --output release/sbom.cdx.json
      - uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be
        with:
          subject-path: dist/*
      - uses: actions/attest-sbom@bd218ad0dbcb3e146bd073d1d9c6d78e08aa8a0b
        with:
          subject-path: dist/*
          sbom-path: release/sbom.cdx.json
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: supply-chain-materials
          path: |
            dist/*
            release/sbom.cdx.json
          if-no-files-found: error
          retention-days: 30
