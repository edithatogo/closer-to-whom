name: Supply-chain attestations

permissions:
  contents: read

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

concurrency:
  group: supply-chain-${{ github.ref }}
  cancel-in-progress: false

jobs:
  attest:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          fetch-depth: 0
      - uses: astral-sh/setup-uv@94527f2e458b27549849d47d273a16bec83a01e9
        with:
          enable-cache: true
      - run: uv sync --locked --all-extras
      - run: uv run python -m build
      - run: uv run python scripts/generate_sbom.py --output release/sbom.cdx.json
      - uses: actions/attest-build-provenance@78e6cbd37d0ac1a40113c04f2037dacf1ea3f12e
        with:
          subject-path: dist/*
      - uses: actions/attest-sbom@36590ecaf038d6630c74f2da259095627d52ac11
        with:
          subject-path: dist/*
          sbom-path: release/sbom.cdx.json
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: supply-chain-materials
          path: |
            dist/*
            release/sbom.cdx.json
          if-no-files-found: error
          retention-days: 30
