name: CI
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
permissions:
  contents: read
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  test-matrix:
    timeout-minutes: 25
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: ["3.14"]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: ${{ matrix.python }}
          cache: pip
      - uses: astral-sh/setup-uv@94527f2e458b27549849d47d273a16bec83a01e9
        with:
          enable-cache: true
      - name: Install project
        run: uv sync --locked --extra dev
      - name: Unit, property, and contract tests
        run: uv run pytest -q --no-cov tests/unit tests/property tests/contract
  full:
    timeout-minutes: 35
    runs-on: ubuntu-latest
    permissions:
      contents: read
      code-quality: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false
          fetch-depth: 0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: "3.14"
          cache: pip
      - uses: astral-sh/setup-uv@94527f2e458b27549849d47d273a16bec83a01e9
        with:
          enable-cache: true
      - run: uv sync --locked --all-extras
      - name: Static quality
        run: |
          uv run ruff format --check src tests scripts
          uv run ruff check src tests scripts
          uv run mypy src
          uv run pyright src
      - name: Test with coverage
        run: uv run pytest -q --cov=closer_to_whom --cov-report=xml --cov-report=term-missing --cov-fail-under=89
      - name: Contracts and boundaries
        run: |
          uv run python scripts/check_contracts.py
          uv run python scripts/check_claim_boundaries.py
          uv run python scripts/check_privacy_and_licences.py
          uv run python scripts/secret_scan.py
      - name: Reproducibility
        run: uv run python scripts/check_reproducibility.py
      - name: JAX differential
        run: uv run python scripts/jax_differential.py
      - name: Upload coverage
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: coverage
          path: coverage.xml
          if-no-files-found: error
      - name: Upload coverage to GitHub Code Quality
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        uses: actions/upload-code-coverage@1c15be36fc3733ba839b1dd643bd9556e4426dc1
        with:
          file: coverage.xml
          language: Python
          label: code-coverage/pytest
