schema_version: 1.0.0
owner: edithatogo
snapshot_date: '2026-07-11'
scope: all public repositories visible on the GitHub profile at snapshot time
public_repository_count: 165
selection_policy:
  principle: include through typed optional interfaces, public data, method reuse, or workflow references; avoid
    dependency bloat and unverified APIs
  hard_runtime_dependencies_from_owner_repositories: 0
  fork_policy: forks may inform conformance or methods but are not required runtime dependencies
  network_policy: registry validation is offline; metadata refresh is scheduled and non-blocking
  licence_policy: public visibility does not imply redistribution permission
  review_granularity: all repositories individually catalogued; core repositories receive typed adapters and issue
    tracks; strong/supporting repositories receive bounded workflow or method roles
  materialisation_policy: no automatic cloning; local workspace planning is explicit, shallow, non-executing, and
    opt-in
  fork_source: GitHub public type=fork filter at the frozen snapshot date
  pipeline_coverage: every selected repository must belong to at least one bounded pipeline
  security_policy: external repositories are never imported, built, or executed automatically
