schema_version: "1.0.0"
track_id: CTW-010-national-service-census
status: planned
objective: Freeze an evidence-graded national registry of relevant cancer-service capability.
inputs:
  - docs/methods/service-census.md
  - data/public/source-registry.yaml
  - schemas/facility.schema.json
outputs:
  - data/derived/facility-registry.parquet
  - reports/service-census-flow.json
  - reports/service-census-disagreements.csv
acceptance_criteria:
  - Every included capability has a public source, represented date, retrieval date, licence state, and evidence grade.
  - Grade 1 and 2 records are dual reviewed.
  - Unknown and absent are not conflated.
  - Conservative, plausible, and broad networks can be materialised reproducibly.
