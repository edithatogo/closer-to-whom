schema_version: "1.0.0"
track_id: CTW-020-public-demand-and-geography
status: active
github_issue: https://github.com/edithatogo/closer-to-whom/issues/3
objective: Build aggregate expected-demand cells and within-area spatial draws from public data.
acceptance_criteria:
  - No individual-like records are created.
  - Geography, population, ethnicity, deprivation, rurality, and vehicle-access versions are frozen.
  - Routing-point weights sum to one and spatial uncertainty is reproducible.
  - Aggregate model calibrates to declared public totals.
  - Every non-frozen input records an explicit pending reason; pending state is never inferred from missing metadata.
