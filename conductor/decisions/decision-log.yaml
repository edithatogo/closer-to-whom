schema_version: "1.0.0"
decisions:
  - id: DEC-001
    date: 2026-07-11
    status: accepted
    decision: Use all of New Zealand as the principal geography.
    rationale: National analysis is policy relevant and supports infrastructure planning; Northern remains historical motivation and a possible subgroup.
  - id: DEC-002
    date: 2026-07-11
    status: accepted
    decision: Restrict the open phase to public aggregate data.
    rationale: Enables independent reproducibility and an out-of-scope policy-evaluation framing while acknowledging simulated limitations.
  - id: DEC-003
    date: 2026-07-11
    status: accepted
    decision: Use Polars and Arrow as the canonical data plane.
    rationale: Supports performance, schema contracts, and multi-language backends.
  - id: DEC-004
    date: 2026-07-11
    status: accepted
    decision: Support JAX now and develop Mojo behind promotion gates.
    rationale: Preserve bleeding-edge acceleration without making an immature toolchain a single point of failure.
  - id: DEC-005
    date: 2026-07-11
    status: accepted
    decision: Combine optimisation with MCDA rather than substituting one for the other.
    rationale: Optimisation identifies efficient candidates; MCDA exposes normative trade-offs.
  - id: DEC-006
    date: 2026-07-11
    status: accepted
    decision: Treat lack of capacity data as a model output question.
    rationale: Estimate implied capacity and test envelopes rather than inventing current operations.
  - id: DEC-007
    date: 2026-07-11
    status: accepted
    decision: Make microdata escalation a VOI decision.
    rationale: Further research is justified by expected decision value, equity relevance, and net benefit rather than granularity alone.
  - id: DEC-008
    date: 2026-07-11
    status: accepted
    decision: Serve only precomputed aggregate cubes in the public Space.
    rationale: Improves security, reproducibility, licensing compliance, and latency.
  - id: DEC-009
    date: 2026-07-15
    status: accepted
    decision: Use SA2 under Stats NZ SSGA23 as the planned principal geography backbone.
    rationale: SSGA23 is the current official geography standard and SA2 provides a practical public aggregate unit; the input and licence freeze remains an explicit gate.
  - id: DEC-010
    date: 2026-07-15
    status: accepted
    decision: Use GCH23 only as a separate rurality stratifier, not as a substitute for route-based access.
    rationale: Rurality and network travel answer different questions. GCH23 is recorded as restricted CC BY-ND material, so transformed redistribution requires permission before publication.
  - id: DEC-011
    date: 2026-07-15
    status: accepted
    decision: Keep the early-breast-cancer pathway synthetic and non-evidentiary until clinical and funding review is complete.
    rationale: Current Pharmac evidence supports funded Phesgo use for HER2-positive metastatic breast cancer from 1 December 2025, but does not establish early-disease eligibility, clinical schedule, or facility capability for this model.
  - id: DEC-012
    date: 2026-07-21
    status: accepted
    decision: >-
      Operate the repository as a sole-developer code harness with zero required GitHub approvals,
      while requiring dated qualified-clinician attestations for the CTW-010 clinical, completeness,
      and licensing scopes and retaining separate equity and ethics governance gates.
    rationale: >-
      A second software reviewer is not part of the operating model. The qualified clinician may
      attest to the defined CTW-010 evidence scopes; attestations remain fail-closed evidence gates
      and are not implied by a code review or local test run.
  - id: DEC-013
    date: 2026-07-21
    status: accepted
    decision: Represent each Māori/equity and ethics governance output with an explicit pending or completed contract state.
    rationale: >-
      Empty review receipts must not be mistaken for a completed governance decision; explicit
      states preserve the external human-review and HDEC boundaries in machine-readable form.
  - id: DEC-014
    date: 2026-07-21
    status: accepted
    decision: Record unavailable GitHub secret-scanning account controls as an explicit security blocker.
    rationale: >-
      Repository-level secret scanning and push protection are enabled, but GitHub reports
      non-provider pattern scanning and validity checks as unavailable or disabled. The owner
      and exact enablement request are documented without overstating the current security posture.
  - id: DEC-015
    date: 2026-07-22
    status: accepted
    decision: >-
      For the current public aggregate and synthetic static harness, Māori/equity review and
      ethics/HDEC determination are out of scope. The sole developer qualified clinician approves
      the licensed public-input freeze, qualified-clinical-attestation model, and policy-publication
      scope, subject to source-level receipts and the remaining evidence gates.
    rationale: >-
      The user explicitly narrowed the current harness to public aggregate policy evaluation and
      approved the three operating gates. This does not claim Māori endorsement, ethical approval,
      HDEC exemption, or authorise a future microdata phase.
