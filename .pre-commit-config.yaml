minimum_pre_commit_version: "3.7.0"
default_install_hook_types: [pre-commit, commit-msg]
default_stages: [pre-commit]
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-added-large-files
        args: ["--maxkb=10240"]
      - id: check-ast
      - id: check-case-conflict
      - id: check-json
      - id: check-merge-conflict
      - id: check-symlinks
      - id: check-toml
      - id: check-yaml
        args: ["--unsafe"]
      - id: debug-statements
      - id: destroyed-symlinks
      - id: end-of-file-fixer
      - id: mixed-line-ending
        args: ["--fix=lf"]
      - id: trailing-whitespace
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.12.2
    hooks:
      - id: ruff-check
        args: ["--fix"]
      - id: ruff-format
  - repo: https://github.com/codespell-project/codespell
    rev: v2.4.1
    hooks:
      - id: codespell
  - repo: local
    hooks:
      - id: machine-contracts
        name: machine-readable contracts
        entry: uv run python scripts/check_machine_readability.py
        language: system
        pass_filenames: false
      - id: claim-boundaries
        name: claim boundaries
        entry: uv run python scripts/check_claim_boundaries.py
        language: system
        pass_filenames: false
      - id: privacy-and-licences
        name: privacy and licence gates
        entry: uv run python scripts/check_privacy_and_licences.py
        language: system
        pass_filenames: false
      - id: generated-files
        name: generated-file drift
        entry: uv run python scripts/check_generated_files.py
        language: system
        pass_filenames: false
      - id: conventional-commit
        name: conventional commit message
        entry: uv run python scripts/check_commit_message.py
        language: system
        stages: [commit-msg]
